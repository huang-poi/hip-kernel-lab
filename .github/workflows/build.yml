name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          echo "Checking repository structure..."
          for dir in conv_2d docs fft flash_attn histogram mat_mul reduce_max reduce_sum scan sort vec_add vec_dot mat_transpose; do
            if [ -d "$dir" ]; then
              echo "✓ $dir/ exists"
            else
              echo "✗ $dir/ missing"
              exit 1
            fi
          done
          echo "All directories validated."

      - name: Check CMake syntax
        run: |
          if [ -f CMakeLists.txt ]; then
            echo "✓ CMakeLists.txt found"
          fi

      - name: Lint shell scripts
        run: |
          find . -name "*.sh" -exec bash -n {} \; 2>&1 || echo "No shell scripts to validate"
